<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试 Methods Data</title>
</head>
<body>
    <h1>测试 Methods Data 加载</h1>
    <div id="output"></div>
    
    <script src="js/methods-data.js"></script>
    <script>
        const output = document.getElementById('output');
        output.innerHTML = '<pre>';
        
        if (typeof methodsData === 'undefined') {
            output.innerHTML += '❌ methodsData 未定义\n';
        } else {
            output.innerHTML += '✅ methodsData 已定义\n';
            output.innerHTML += `方法数量：${Object.keys(methodsData.methods).length}\n`;
            output.innerHTML += `金字塔层级：${Object.keys(methodsData.pyramid).length}\n`;
            output.innerHTML += `知识图谱节点：${methodsData.knowledgeGraph.nodes.length}\n`;
            output.innerHTML += `知识图谱边：${methodsData.knowledgeGraph.edges.length}\n`;
            
            output.innerHTML += '\n方法列表:\n';
            Object.keys(methodsData.methods).forEach(key => {
                output.innerHTML += `  - ${key}: ${methodsData.methods[key].name}\n`;
            });
        }
        
        output.innerHTML += '</pre>';
    </script>
</body>
</html>
